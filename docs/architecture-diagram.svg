<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">IMS Architecture Diagram</title>
  <desc id="desc">Client layer, API layer, ingestion and processing, storage layer, and observability boxes connected with arrows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f3f5f7"/>
    </linearGradient>
    <linearGradient id="client" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f7ff"/>
      <stop offset="100%" stop-color="#dcecff"/>
    </linearGradient>
    <linearGradient id="api" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f9ed"/>
      <stop offset="100%" stop-color="#dff0d7"/>
    </linearGradient>
    <linearGradient id="storage" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#e2eefc"/>
    </linearGradient>
    <linearGradient id="obs" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff2df"/>
      <stop offset="100%" stop-color="#ffe4c3"/>
    </linearGradient>
    <linearGradient id="queue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcfcfc"/>
      <stop offset="100%" stop-color="#eceff3"/>
    </linearGradient>
    <linearGradient id="worker" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfff4"/>
      <stop offset="100%" stop-color="#d8f4e2"/>
    </linearGradient>
    <linearGradient id="postgres" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f8ff"/>
      <stop offset="100%" stop-color="#dceafc"/>
    </linearGradient>
    <linearGradient id="redis" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff1f1"/>
      <stop offset="100%" stop-color="#ffd9d9"/>
    </linearGradient>
    <style>
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #111827; letter-spacing: .5px; }
      .label { font: 600 20px Arial, Helvetica, sans-serif; fill: #111827; }
      .small { font: 400 16px Arial, Helvetica, sans-serif; fill: #374151; }
      .tiny { font: 400 14px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .box { stroke: #6b7280; stroke-width: 2; rx: 18; ry: 18; }
      .thin { stroke: #6b7280; stroke-width: 1.5; rx: 16; ry: 16; }
      .arrow { stroke: #111827; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrowThin { stroke: #374151; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke-dasharray: 8 6; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>

  <rect x="270" y="20" width="1060" height="160" class="box" fill="url(#client)"/>
  <text x="285" y="45" class="label">CLIENT LAYER</text>
  <rect x="560" y="30" width="520" height="130" class="box" fill="#eef6ff"/>
  <text x="630" y="64" class="title">React Frontend (Dashboard UI)</text>
  <rect x="610" y="80" width="120" height="56" class="thin" fill="#fff"/>
  <text x="628" y="114" class="small">Live Feed</text>
  <rect x="775" y="80" width="130" height="56" class="thin" fill="#fff"/>
  <text x="786" y="114" class="small">Incident Details</text>
  <rect x="940" y="80" width="110" height="56" class="thin" fill="#fff"/>
  <text x="963" y="114" class="small">RCA Form</text>

  <rect x="250" y="210" width="1100" height="155" class="box" fill="url(#api)"/>
  <text x="270" y="240" class="label">API LAYER</text>
  <text x="470" y="240" class="small">FastAPI / Node.js</text>
  <rect x="270" y="255" width="270" height="92" class="thin" fill="#f4fff7"/>
  <text x="305" y="293" class="label">Signal Ingestion API</text>
  <text x="340" y="320" class="small">Rate Limiter</text>
  <rect x="570" y="255" width="250" height="92" class="thin" fill="#fff2f2"/>
  <text x="618" y="292" class="label">Incident APIs</text>
  <text x="618" y="320" class="small">Listing / details</text>
  <rect x="845" y="255" width="240" height="92" class="thin" fill="#fff2f2"/>
  <text x="892" y="292" class="label">RCA Submission</text>
  <text x="905" y="320" class="small">Endpoint</text>
  <rect x="1110" y="255" width="200" height="92" class="thin" fill="#edf2ff"/>
  <text x="1148" y="293" class="label">WebSocket</text>
  <text x="1178" y="320" class="small">Server</text>

  <rect x="310" y="400" width="980" height="160" class="box" fill="#f7fafc"/>
  <text x="330" y="430" class="label">INGESTION &amp; PROCESSING</text>
  <rect x="345" y="450" width="300" height="90" class="thin" fill="url(#queue)"/>
  <text x="415" y="490" class="label">Redis Streams Queue</text>
  <text x="422" y="516" class="small">Asynchronous buffer</text>
  <rect x="680" y="440" width="280" height="115" class="thin" fill="url(#worker)"/>
  <text x="750" y="480" class="label">Worker Service</text>
  <text x="768" y="507" class="small">Consumer</text>
  <rect x="940" y="450" width="320" height="90" class="thin" fill="#fff2d6"/>
  <text x="992" y="486" class="label">Debouncing Logic</text>
  <text x="1006" y="513" class="small">10-second window</text>

  <rect x="250" y="610" width="1260" height="240" class="box" fill="#f8fafc"/>
  <text x="270" y="640" class="label">STORAGE LAYER</text>
  <rect x="280" y="665" width="300" height="165" class="thin" fill="#eaffea"/>
  <text x="355" y="708" class="label">MongoDB</text>
  <text x="348" y="736" class="small">Raw Signals</text>
  <rect x="620" y="665" width="460" height="165" class="thin" fill="url(#postgres)"/>
  <text x="780" y="708" class="label">PostgreSQL</text>
  <text x="724" y="736" class="small">Incidents + RCA</text>
  <text x="730" y="780" class="tiny">OPEN → INVESTIGATING → RESOLVED → CLOSED</text>
  <rect x="1120" y="665" width="350" height="165" class="thin" fill="url(#redis)"/>
  <text x="1235" y="708" class="label">Redis Cache</text>
  <text x="1214" y="736" class="small">Real-time dashboard state</text>

  <rect x="1320" y="210" width="240" height="330" class="box" fill="url(#obs)"/>
  <text x="1360" y="240" class="label">OBSERVABILITY</text>
  <rect x="1350" y="260" width="180" height="66" class="thin" fill="#fff"/>
  <text x="1410" y="302" class="label">/health</text>
  <rect x="1350" y="340" width="180" height="82" class="thin" fill="#fff"/>
  <text x="1405" y="373" class="small">Logging</text>
  <text x="1375" y="398" class="tiny">signals/sec, metrics</text>
  <rect x="1350" y="436" width="180" height="82" class="thin" fill="#fff"/>
  <text x="1400" y="468" class="small">Metrics</text>

  <rect x="35" y="280" width="145" height="92" class="thin" fill="#fff"/>
  <text x="72" y="318" class="label">Signal</text>
  <text x="61" y="345" class="small">Sources</text>
  <line x1="180" y1="326" x2="270" y2="326" class="arrow"/>
  <text x="45" y="265" class="title" style="font-size:22px;">High-Volume</text>
  <text x="45" y="292" class="title" style="font-size:22px;">Ingestion</text>

  <line x1="405" y1="365" x2="405" y2="450" class="arrow"/>
  <line x1="670" y1="300" x2="570" y2="300" class="arrowThin"/>
  <line x1="820" y1="347" x2="820" y2="440" class="arrow"/>
  <line x1="1065" y1="347" x2="1065" y2="450" class="arrow"/>
  <line x1="1210" y1="347" x2="1210" y2="450" class="arrow"/>

  <line x1="510" y1="540" x2="510" y2="665" class="arrow"/>
  <line x1="820" y1="555" x2="820" y2="665" class="arrow"/>
  <line x1="1140" y1="540" x2="1140" y2="665" class="arrow"/>

  <line x1="1300" y1="322" x2="1320" y2="322" class="arrowThin"/>
  <line x1="1500" y1="504" x2="1500" y2="665" class="arrowThin"/>
  <line x1="1460" y1="554" x2="1460" y2="665" class="arrowThin"/>

  <line x1="1170" y1="665" x2="1170" y2="594" class="arrowThin"/>
  <line x1="1030" y1="594" x2="1030" y2="540" class="arrowThin"/>
  <line x1="1350" y1="540" x2="1350" y2="665" class="arrowThin"/>

  <line x1="1240" y1="450" x2="1240" y2="350" class="arrowThin"/>
  <line x1="1240" y1="350" x2="1300" y2="350" class="arrowThin"/>
  <text x="1262" y="398" class="small">Read</text>

  <text x="1110" y="405" class="small">WebSockets</text>
  <text x="1330" y="190" class="small">Live pushing</text>
  <text x="1380" y="585" class="small">User actions</text>
</svg>
